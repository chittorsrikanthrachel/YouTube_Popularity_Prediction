<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hashtag Recommendation</title>

  <style>
    :root{
      --card-bg: rgba(255,255,255,0.90);
      --card-radius: 14px;
      --shadow: 0 8px 30px rgba(0,0,0,0.12);
      --label-color: #222;
      --input-border: #ccc;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, Arial;
      background-image: url('/static/image27.png');
      background-repeat: repeat;
      background-size: auto;
      display:flex;
      align-items:center;
      justify-content:center;
	  overflow:hidden;
      padding:20px;
      background-color:#ffffff;
	  justify-content:center;
	  padding-top:5px;
    }

    .card{
      width:100%;
      max-width:700px;
      background: var(--card-bg);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
      padding:24px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px;
	  overflow:auto;
	  max-height:90vh;
      backdrop-filter: blur(4px);
    }

    /* Heading with hashtag icon and black outline */
    .main-heading{
      grid-column: 1 / -1;
      font-size:24px;
      font-weight:900;
      color: #007BFF; /* blue */
      text-align:center;
      margin-bottom:6px;
      letter-spacing:1px;
      text-shadow:
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
    }

    label{
      display:block;
      font-size:12px;
      font-weight:700;
      color:var(--label-color);
      margin-bottom:4px;
      letter-spacing:0.5px;
    }

    input[type="number"],
    input[type="text"],
    select{
      width:100%;
      padding:10px 12px;
      border-radius:18px;
      border:1px solid var(--input-border);
      font-size:13px;
      box-sizing:border-box;
      background:white;
    }

    .field{ margin-bottom:8px; }
    .full-row{ grid-column: 1 / -1; }

    .actions{
      grid-column: 1 / -1;
      text-align:center;
      margin-top:10px;
    }

    /* Blue recommend button */
    button.primary{
      background:#007BFF;  
      color:#fff;          
      border:0;
      cursor:pointer;
      font-weight:700;
      font-size:16px;
      padding:14px 28px;
      border-radius:12px;
      box-shadow: 0 6px 18px rgba(0,123,255,0.4); 
      transition:0.2s;
    }

    button.primary:hover{
      background:#0056b3; 
      box-shadow: 0 6px 18px rgba(0,86,179,0.5);
    }

    @media (max-width:720px){
      .card{ grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <form class="card" action="/recommend_tags" method="POST">
    
    <div class="main-heading">
       <h2>#️⃣ HASHTAGS RECOMMENDATION</h2>
    </div>

    <div class="field full-row">
		<label for="video_category">VIDEO CATEGORY</label>
		<select id="video_category" name="video_category" required>
			<option value="">-- Select Category --</option>
			
			<option value="Film & Animation">Film & Animation</option>
			<option value="Autos & Vehicles">Autos & Vehicles</option>
			<option value="Music">Music</option>
			<option value="Pets & Animals">Pets & Animals</option>
			<option value="Sports">Sports</option>
			<option value="Short Movies">Short Movies</option>
			<option value="Travel & Events">Travel & Events</option>
			<option value="Gaming">Gaming</option>
			<option value="Videoblogging">Videoblogging</option>
			<option value="People & Blogs">People & Blogs</option>
			<option value="Comedy">Comedy</option>
			<option value="Entertainment">Entertainment</option>
			<option value="News & Politics">News & Politics</option>
			<option value="Howto & Style">Howto & Style</option>
			<option value="Education">Education</option>
			<option value="Science & Technology">Science & Technology</option>
			<option value="Nonprofits & Activism">Nonprofits & Activism</option>
			<option value="Movies">Movies</option>
			<option value="Anime/Animation">Anime/Animation</option>
			<option value="Action/Adventure">Action/Adventure</option>
			<option value="Classics">Classics</option>
			<option value="Comedy (alternate)">Comedy (alternate)</option>
			<option value="Documentary">Documentary</option>
			<option value="Drama">Drama</option>
			<option value="Family">Family</option>
			<option value="Foreign">Foreign</option>
			<option value="Horror">Horror</option>
			<option value="Sci-Fi/Fantasy">Sci-Fi/Fantasy</option>
			<option value="Thriller">Thriller</option>
			<option value="Shorts">Shorts</option>
			<option value="Shows">Shows</option>
			<option value="Trailers">Trailers</option>

		</select>
	</div>

    <div class="field full-row">
      <label for="video_title">VIDEO TITLE</label>
      <input id="video_title" name="video_title" type="text" required>
    </div>

    <div class="actions">
      <button type="submit" class="primary">RECOMMEND HASHTAGS</button>
    </div>

  </form>

</body>
</html>
