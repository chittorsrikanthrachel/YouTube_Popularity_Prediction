<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube Likes Prediction Result</title>

  <style>
    :root{
      --card-bg: rgba(255,255,255,0.90);
      --card-radius: 14px;
      --shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    body{
      margin:0;
      min-height:100vh;
      font-family: Inter, Arial;
      background-image: url('/static/image26.png');
      background-repeat: repeat;
      background-size: auto;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background-color:#ffffff;
    }

    .card{
      width:100%;
      max-width:600px;
      background: var(--card-bg);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
      padding:32px 24px;
      text-align:center;
      backdrop-filter: blur(4px);
    }

    .main-heading{
      font-size:24px;
      font-weight:900;
      color:#FFC300;
      letter-spacing:1px;
      margin-bottom:24px;
    }

    /* Yellow prediction box */
    .result-box{
      background:#FFD700;
      border-radius:16px;
      padding:24px;
      margin-bottom:28px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }

    .result-label{
      font-size:25px;
      font-weight:700;
      letter-spacing:1px;
      color:#000;
      margin-bottom:8px;
    }

    .prediction{
      font-size:36px;
      font-weight:900;
      color:#000;
    }

    /* Plain back link */
    .back-link{
      font-size:14px;
      font-weight:700;
      color:#000;
      text-decoration:none;
      border-bottom:2px solid transparent;
      transition:0.2s;
    }

    .back-link:hover{
      border-bottom:2px solid #000;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="main-heading">
      👍 YOUTUBE LIKES PREDICTION
    </div>

    <div class="result-box">
      <div class="result-label">PREDICTED LIKES</div>
      <div class="prediction">{{ prediction }}</div>
    </div>

  </div>

</body>
</html>
